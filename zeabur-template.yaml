apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: deep-research

spec:
  name: Deep Research
  description: 基于 Gemini 的深度研究引擎，支持异步任务执行、实时进度追踪、Webhook 回调

  icon: https://raw.githubusercontent.com/xiangyugongzuoliu/deep-research-zeabur/main/assets/icon.svg
  author: 翔宇工作流

  tags:
    - AI
    - Research
    - API
    - Gemini
    - n8n
    - Markdown
    - 深度研究
    - 自动化

  readme: https://github.com/xiangyugongzuoliu/deep-research-zeabur

  source:
    type: git
    url: https://github.com/xiangyugongzuoliu/deep-research-zeabur

  variables:
    - key: GOOGLE_GENERATIVE_AI_API_KEY
      type: STRING
      name: Gemini API Key
      description: 从 https://aistudio.google.com/app/apikey 获取 Gemini API Key

    - key: ACCESS_PASSWORD
      type: PASSWORD
      name: 访问密码
      description: 用于前端代理模式和 REST API 认证（建议使用 32 位随机字符串）

    - key: TAVILY_API_KEY
      type: STRING
      name: Tavily API Key（可选）
      description: 用于外部搜索服务，从 https://tavily.com 获取。配置后将自动获取图片和完整引用来源，留空则使用 Gemini 内置搜索

  services:
    - name: deep-research
      template: PREBUILT
      spec:
        id: deep-research
        name: Deep Research API
        icon: https://raw.githubusercontent.com/xiangyugongzuoliu/deep-research-zeabur/main/assets/icon.svg
        source:
          image: xiangyugongzuoliu/deep-research:latest
        ports:
          - id: web
            port: 3000
            type: HTTP
        volumes: []
        env:
          GOOGLE_GENERATIVE_AI_API_KEY:
            expose: true
          ACCESS_PASSWORD:
            expose: true
          TAVILY_API_KEY:
            expose: true
            default: ""
          TASK_RETENTION_HOURS:
            default: "24"
