<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 文档背景 -->
  <rect x="20" y="10" width="60" height="80" rx="4" fill="url(#gradient)"/>

  <!-- 搜索图标 -->
  <circle cx="50" cy="40" r="12" fill="none" stroke="white" stroke-width="3"/>
  <line x1="58" y1="48" x2="65" y2="55" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- 文本线条 -->
  <line x1="30" y1="65" x2="70" y2="65" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="73" x2="60" y2="73" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="81" x2="65" y2="81" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
